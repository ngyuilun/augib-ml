<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUGIB Outcome Predictor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            border-bottom: 2px solid #3498db;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .disclaimer {
            background-color: #fff3cd;
            color: #856404;
            padding: 10px;
            border-left: 4px solid #ffeeba;
            font-size: 0.9em;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        label {
            font-weight: 600;
            flex-basis: 50%;
        }
        input[type="number"], select {
            flex-basis: 45%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 16px;
        }
        .section-title {
            margin-top: 30px;
            color: #3498db;
            font-size: 1.2em;
            margin-bottom: 15px;
        }
        button {
            display: block;
            width: 100%;
            padding: 15px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 30px;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #218838;
        }
        #result-box {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background-color: #e2eef9;
            border: 1px solid #b8daff;
            border-radius: 5px;
            text-align: center;
        }
        #result-value {
            font-size: 24px;
            font-weight: bold;
            color: #004085;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>AUGIB Outcome Predictor</h1>
    
    <div class="disclaimer">
        <strong>Disclaimer:</strong> This tool is for research and educational purposes only. It is advised to verify the result before clinical usage.
    </div>

    <form id="augib-form">
        
        <div class="section-title">Patient Demographics & Vitals</div>
        <div class="form-group">
            <label for="N_AGE">Age (Years) *</label>
            <input type="number" id="N_AGE" required>
        </div>
        <div class="form-group">
            <label for="N_SBP">Systolic blood pressure (mmHg) *</label>
            <input type="number" id="N_SBP" required>
        </div>

        <div class="section-title">Laboratory Values</div>
        <div class="form-group">
            <label for="N_ALBUMIN">Serum albumin (g/L) *</label>
            <input type="number" id="N_ALBUMIN" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="N_ALP">Alkaline phosphatase (IU/L) *</label>
            <input type="number" id="N_ALP" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="N_BILIRUBIN">Serum bilirubin(umol/L) *</label>
            <input type="number" id="N_BILIRUBIN" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="N_SODIUM">Serum sodium (mmol/L) *</label>
            <input type="number" id="N_SODIUM" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="N_UREA">Serum urea (mmol/L) *</label>
            <input type="number" id="N_UREA" step="0.1" required>
        </div>
        <div class="form-group">
            <label for="N_INR">INR *</label>
            <input type="number" id="N_INR" step="0.01" required>
        </div>
        <div class="form-group">
            <label for="N_PLT_NO">No. of platelets transfused *</label>
            <input type="number" id="N_PLT_NO" required>
        </div>
        <div class="form-group">
            <label for="N_PC_NO">No. of packed cells transfused *</label>
            <input type="number" id="N_PC_NO" required>
        </div>

        <div class="section-title">Clinical Assessments</div>
        <div class="form-group">
            <label for="C_ACIDOSIS">Acidosis in venous/arterial blood gas *</label>
            <select id="C_ACIDOSIS">
                <option value="NA">NONE</option>
                <option value="1">ARTERIAL</option>
                <option value="2">VENOUS</option>
            </select>
        </div>
        <div class="form-group">
            <label for="C_ICU_PRIOR">Need for ICU admission before OGD *</label>
            <select id="C_ICU_PRIOR">
                <option value="1">YES</option>
                <option value="2">NO</option>
            </select>
        </div>
        <div class="form-group">
            <label for="C_CANCER">Presence of cancer *</label>
            <select id="C_CANCER">
                <option value="0">None</option>
                <option value="1">Localized</option>
                <option value="2">Metastatic</option>
            </select>
        </div>
        <div class="form-group">
            <label for="C_NEED_TE">Need for endoscopic therapy during OGD</label>
            <select id="C_NEED_TE">
                <option value="NA">NO OGD DONE</option>
                <option value="1">YES</option>
                <option value="2">NO</option>
            </select>
        </div>
        <div class="form-group">
            <label for="C_FORREST">Forrest classification</label>
            <select id="C_FORREST">
                <option value="NA">No OGD Done</option>
                <option value="1a">Active spurting</option>
                <option value="1b">Active oozing</option>
                <option value="2a">Non-bleeding visible vessel (artery)</option>
                <option value="2b">Adherent clot</option>
                <option value="2c">Flat pigmented spot</option>
                <option value="3">Clean ulcer base</option>
            </select>
        </div>

        <button type="button" onclick="calculateRisk()">Calculate Probability</button>
    </form>

    <div id="result-box">
        <h3>Model Prediction</h3>
        <p id="result-value">--</p>
    </div>

</div>

<script>
    function calculateRisk() {
        // 1. Gather Numeric Inputs
        const n_age = parseFloat(document.getElementById('N_AGE').value) || 0;
        const n_sbp = parseFloat(document.getElementById('N_SBP').value) || 0;
        const n_albumin = parseFloat(document.getElementById('N_ALBUMIN').value) || 0;
        const n_alp = parseFloat(document.getElementById('N_ALP').value) || 0;
        const n_bilirubin = parseFloat(document.getElementById('N_BILIRUBIN').value) || 0;
        const n_sodium = parseFloat(document.getElementById('N_SODIUM').value) || 0;
        const n_urea = parseFloat(document.getElementById('N_UREA').value) || 0;
        const n_inr = parseFloat(document.getElementById('N_INR').value) || 0;
        const n_plt_no = parseFloat(document.getElementById('N_PLT_NO').value) || 0;
        const n_pc_no = parseFloat(document.getElementById('N_PC_NO').value) || 0;

        // 2. Gather Categorical Inputs and One-Hot Encode them based on dataset format
        const acidosis = document.getElementById('C_ACIDOSIS').value;
        const c_acidosis_1 = (acidosis === "1") ? 1 : 0;
        const c_acidosis_2 = (acidosis === "2") ? 1 : 0;

        const icu = document.getElementById('C_ICU_PRIOR').value;
        const c_icu_prior_1 = (icu === "1") ? 1 : 0;
        const c_icu_prior_2 = (icu === "2") ? 1 : 0;

        const cancer = document.getElementById('C_CANCER').value;
        const c_cancer_0 = (cancer === "0") ? 1 : 0; 

        const need_te = document.getElementById('C_NEED_TE').value;
        const c_need_te_2 = (need_te === "2") ? 1 : 0;

        const forrest = document.getElementById('C_FORREST').value;
        const c_forrest_3 = (forrest === "3") ? 1 : 0;

        // 3. Create the feature array/object expected by your model
        const features = {
            N_PC_NO: n_pc_no,
            C_ACIDOSIS_1: c_acidosis_1,
            N_ALBUMIN: n_albumin,
            N_AGE: n_age,
            C_NEED_TE_2: c_need_te_2,
            N_ALP: n_alp,
            N_SODIUM: n_sodium,
            C_CANCER_0: c_cancer_0,
            N_INR: n_inr,
            N_PLT_NO: n_plt_no,
            C_FORREST_3: c_forrest_3,
            N_BILIRUBIN: n_bilirubin,
            C_ACIDOSIS_2: c_acidosis_2,
            C_ICU_PRIOR_1: c_icu_prior_1,
            N_UREA: n_urea,
            C_ICU_PRIOR_2: c_icu_prior_2,
            N_SBP: n_sbp
        };

        console.log("Input Features prepared for model:", features);

        // 4. PREDICTION LOGIC 
        // ------------------------------------------------------------------
        // Connect this to your actual ML API to fetch the real probability
        // ------------------------------------------------------------------
        
        // Placeholder function to output a probability formatting based on inputs
        // Replace 'probability' with the actual output variable from your model
        let mock_probability = 0.654; // E.g., 65.4%
        
        // Let's create a dynamic mock probability just so the UI moves when testing
        let dynamic_prob = (n_age > 65 ? 0.3 : 0.1) + (n_sbp < 100 ? 0.4 : 0.1);
        if (dynamic_prob > 0.99) dynamic_prob = 0.99;
        
        const finalPercentage = (dynamic_prob * 100).toFixed(1);

        // 5. Display the result
        document.getElementById('result-value').innerText = "High Risk Probability: " + finalPercentage + "%";
        document.getElementById('result-box').style.display = 'block';
    }
</script>

</body>
</html>
